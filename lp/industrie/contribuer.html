<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Scènes d'Arbitrage — Contribution éditoriale personnalisée</title>
  <meta name="description" content="Une proposition de contribution éditoriale personnalisée dans le cycle Industrie & transformation des territoires.">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#111111">

  <link rel="icon" href="/images/favicon-en-plateau.svg" type="image/svg+xml">
  <link rel="icon" href="/images/Favenplateau.png" type="image/png" sizes="96x96">
  <link rel="apple-touch-icon" href="/images/Favenplateau.png">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/layout.css?v=moteur-v6-cast-publicrefs-20260517-0610">

</head>

<body class="landing-page" data-page="industrie-contribuer" data-cycle="industrie">
  <main id="landing-root" class="landing-root" aria-live="polite">
    <section class="landing-loading">
      <div class="landing-loading__box">
        <a class="landing-brand landing-brand--loading" href="/" aria-label="Scènes d'Arbitrage — accueil">Scènes d'Arbitrage</a>
        <h1>Chargement de votre proposition éditoriale</h1>
        <p>
          Si cette page reste affichée, vérifiez que l'URL contient un identifiant de proposition valide,
          par exemple une référence publique de type cast.
        </p>
      </div>
    </section>
  </main>

<script src="/assets/js/editorial-data-industrie-v67.js?v=20260521-js1"></script>
<script src="/assets/js/editorial-data-industrie-enrichments.js?v=20260521-js1"></script>
<script src="/assets/js/render-core.js?v=20260521-js1"></script>
<script src="/assets/js/render-landing.js?v=20260521-js1"></script>

  <script>
    (function () {

      /* ── Configuration ─────────────────────────────────────────── */

      var LOGO_SRC    = "/images/logo-scenes-transparent-no-baseline-v2.png";
      var LOGO_ALT    = "Scènes d'Arbitrage";
      var LOGO_HEIGHT = "56";   /* px — ajuster si le logo SVG a des proportions différentes */

      var TRIO_IMAGE_SRC = "/images/trio-journalistes.jpg?v=20260522";
      var TRIO_IMAGE_ALT = "Journalistes associés à Scènes d'Arbitrage";
      var JOURNALISTS = [
        { name: "C. Pallée",   media: "BFM Business" },
        { name: "G. Leclerc",  media: "La Tribune"   },
        { name: "T. Cabannes", media: "Le Figaro"    }
      ];

      /* ── Logo ──────────────────────────────────────────────────── */

      /*
        render-landing.js injecte le bandeau avec un élément logo dont
        la structure exacte (img, svg inline, span texte) n'est pas
        connue ici. On remplace directement le contenu du .landing-brand
        par une balise <img> avec les dimensions voulues, ce qui contourne
        toute incertitude sur les classes ou l'élément généré.
        On attend que le bandeau soit rendu avant d'intervenir.
      */
      function applyLogo() {
        var brand = document.querySelector(".landing-top .landing-brand");
        if (!brand) return false;
        if (brand.dataset.logoApplied === "true") return true;

        brand.innerHTML = "";

        var img = document.createElement("img");
        img.src    = LOGO_SRC;
        img.alt    = LOGO_ALT;
        img.height = LOGO_HEIGHT;
        img.style.cssText = [
          "display:block",
          "height:" + LOGO_HEIGHT + "px",
          "width:auto",
          "max-width:min(320px,46vw)",
          "object-fit:contain"
        ].join(";");

        brand.appendChild(img);
        brand.dataset.logoApplied = "true";
        return true;
      }

      /* ── Trio journalistes ─────────────────────────────────────── */

      function buildTrioMarkup() {
        var items = JOURNALISTS.map(function (item) {
          return '<span class="landing-film-trio__item">'
            + '<strong>' + item.name + '</strong>'
            + '<em>' + item.media + '</em>'
            + '</span>';
        }).join("");

        return '<img src="' + TRIO_IMAGE_SRC + '" alt="' + TRIO_IMAGE_ALT + '" class="landing-film-trio__image">'
          + '<div class="landing-film-trio" aria-label="Journalistes et médias">' + items + '</div>';
      }

      /*
        Injecte le trio statique dans .landing-film-track > div dès que
        le moteur JS l'a créé, et supprime tous les éléments résiduels
        de noms/médias que render-landing.js peut avoir injectés autour.
      */
      function applyStaticJournalistsTrio() {
        var frame = document.querySelector(".landing-film-track > div");
        if (!frame) return false;
        if (frame.dataset.staticJournalistsTrio === "true") return true;

        frame.innerHTML = buildTrioMarkup();
        frame.dataset.staticJournalistsTrio = "true";

        [
          ".landing-film-caption",
          ".landing-film-overlay",
          ".landing-hero-media-caption",
          ".landing-hero-media-tag"
        ].forEach(function (sel) {
          var el = document.querySelector(sel);
          if (el) el.remove();
        });

        return true;
      }

      /* ── Orchestration ─────────────────────────────────────────── */

      var observer = null;
      var timer    = null;

      function onApplied() {
        if (timer)    { window.clearInterval(timer); timer    = null; }
        if (observer) { observer.disconnect();        observer = null; }
      }

      function applyAll() {
        var logoOk = applyLogo();
        var trioOk = applyStaticJournalistsTrio();
        return logoOk && trioOk;
      }

      /* Polling toutes les 150 ms, 40 tentatives max (= 6 secondes) */
      var attempts = 40;
      timer = window.setInterval(function () {
        if (applyAll()) { onApplied(); return; }
        if (--attempts <= 0) { onApplied(); }
      }, 150);

      /* MutationObserver en filet de sécurité si le rendu JS est tardif */
      var root = document.getElementById("landing-root");
      if (root && "MutationObserver" in window) {
        observer = new MutationObserver(function () {
          if (applyAll()) { onApplied(); }
        });
        observer.observe(root, { childList: true, subtree: true });
      }

    })();
  </script>

  <noscript>
    <section class="landing-loading">
      <div class="landing-loading__box">
        <a class="landing-brand landing-brand--loading" href="/" aria-label="Scènes d'Arbitrage — accueil">Scènes d'Arbitrage</a>
        <h1>JavaScript est nécessaire</h1>
        <p>
          Cette page utilise le référentiel éditorial Scènes d'Arbitrage pour afficher une proposition personnalisée.
          Activez JavaScript pour consulter le contenu.
        </p>
      </div>
    </section>
  </noscript>
</body>
</html>
