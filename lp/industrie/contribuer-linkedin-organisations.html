function buildRelay(civ,prealable,org,media,role){var action=role==='communication'?'associer la communication':(role==='affaires publiques'?'associer les affaires publiques':'vous associer');var start=prealable?'après avoir informé '+prealable+', ':'';return firstUnder300(['Bonjour '+civ+', '+start+'Scènes d’Arbitrage prépare plusieurs conversations Industrie où '+org+' pourrait contribuer, diffusées sur '+media+'. Si cela avance, je souhaiterais '+action+' en amont.','Bonjour '+civ+', '+start+'Scènes d’Arbitrage prépare plusieurs conversations Industrie avec '+org+', diffusées sur '+media+'. Si cela avance, je souhaiterais '+action+' en amont.','Bonjour '+civ+', '+start+'Scènes d’Arbitrage prépare plusieurs conversations Industrie avec '+compact(org,38)+', diffusées sur '+compact(media,38)+'. Je souhaiterais '+action+' en amont.'])}
function buildIntervenant(iv,prealable){var lead=prealable?'après avoir informé '+prealable+', ':'';return firstUnder300(['Bonjour '+iv.nomCourt+', '+lead+'Scènes d’Arbitrage prépare une conversation sur '+iv.objet+'. Votre fonction semble pertinente pour une lecture '+iv.lecture+' diffusée sur '+iv.media+'. Puis-je vous transmettre la page de cadrage ?','Bonjour '+iv.nomCourt+', '+lead+'Scènes d’Arbitrage prépare une conversation sur '+compact(iv.objet,64)+'. Votre fonction semble pertinente pour une lecture '+iv.lecture+' sur '+iv.media+'. Puis-je vous transmettre la page de cadrage ?','Bonjour '+iv.nomCourt+', '+lead+'Scènes d’Arbitrage prépare une conversation Industrie. Votre fonction semble pertinente pour une lecture '+iv.lecture+' diffusée sur '+compact(iv.media,42)+'. Puis-je vous transmettre la page de cadrage ?'])}
function appuiCard(a,labelOverride){return '<div class="ep-card"><div class="ep-card-role">'+esc(labelOverride||a.label)+(a.alsoIntervenant?' · aussi intervenant':'')+'</div><div class="ep-card-name">'+esc(a.civ||civNom(a.name,a.poste)||a.name)+'</div>'+(a.poste?'<div class="ep-card-meta">'+esc(a.poste)+'</div>':'')+(a.li?'<a class="ep-card-link" href="'+esc(a.li)+'" target="_blank">LinkedIn →</a>':'')+'</div>'}
function positionCard(iv){var landing='https://scenesdarbitrage.fr/lp/industrie/contribuer.html?cast='+encodeURIComponent(iv.ref);return '<div class="ep-card"><div class="ep-card-role">'+esc(iv.lecture)+' · '+esc(iv.conversation)+' · rang '+esc(iv.rang)+'</div><div class="ep-card-name">'+esc(iv.nomCourt||iv.nom)+'</div><div class="ep-card-meta">'+esc(iv.poste)+'</div><div class="ep-card-meta">'+esc(iv.objet)+' · '+esc(iv.media||'média à vérifier')+'</div>'+(iv.linkedin?'<a class="ep-card-link" href="'+esc(iv.linkedin)+'" target="_blank">Profil LinkedIn →</a> · ':'')+'<a class="ep-card-link" href="'+esc(landing)+'" target="_blank">Landing →</a></div>'}
function renderIndex(groups){var arr=Object.values(groups).filter(function(g){return g.isMulti}).sort(function(a,b){return b.people.length-a.people.length || s(a.org.name).localeCompare(s(b.org.name))});var rows=arr.map(function(g){var first=s(g.deals[0].publicRef||Core.getDealId(g.deals[0]));var lectures=uniqBy(g.deals,function(d){return lec((d.editorialContext||{}).typeLecture||'')}).map(function(d){return lec((d.editorialContext||{}).typeLecture||'')}).slice(0,4).join(' · ');return '<a class="ep-org-row" href="?cast='+encodeURIComponent(first)+'"><div><div class="ep-org-row-title">'+esc((g.org||{}).name||'Organisation')+'</div><div class="ep-org-row-meta">'+g.people.length+' intervenants actifs · '+g.deals.length+' positions · '+esc(lectures)+'</div></div><div class="ep-org-row-count">ouvrir</div></a>'}).join('');return '<main class="ep-main"><section class="ep-panel ep-panel--gold"><div class="ep-kicker">Index organisations multi-intervenants</div><h1 class="ep-title">Pages LinkedIn communes à une même organisation</h1><p class="ep-sub">Cette vue liste les organisations qui ont plusieurs intervenants actifs. Les relais internes doivent être contactés une seule fois avec un message global, puis les intervenants sont traités depuis la même page.</p><div class="ep-tags"><span class="ep-tag ep-tag--accent">'+arr.length+' organisations concernées</span></div></section><section class="ep-section"><div class="ep-section-title">Organisations à page commune</div><div class="ep-org-list">'+(rows||'<div class="ep-state">Aucune organisation multi-intervenants détectée avec les critères actifs actuels.</div>')+'</div></section></main>'}
function renderGroup(g,selectedRef){var orgName=s((g.org||{}).name||'Organisation');var activeDeals=g.deals.slice().sort(function(a,b){return rangNum(a)-rangNum(b)||getPersonName(a).localeCompare(getPersonName(b))});var summaries=activeDeals.map(dealSummary);var media=mediasForDeals(activeDeals);var appuis=collectAppuis(activeDeals);var pdg=appuis.find(function(a){return a.kind==='pdg'});var dg=appuis.find(function(a){return a.kind==='dg'});var comex=appuis.find(function(a){return a.kind==='comex'});var comm=appuis.find(function(a){return a.kind==='communication'});var ap=appuis.find(function(a){return a.kind==='affaires publiques'});var firstLeader=pdg||dg||comex||null;var firstLeaderCiv=firstLeader?(firstLeader.civ||civNom(firstLeader.name,firstLeader.poste)):'';var relayHTML='';if(pdg)relayHTML+=acc('ep-toggle-icon--dg','1','Invitation PDG / Président — message unique organisation',msgBlock('Invitation PDG / Président',buildPDG(pdg.civ||civNom(pdg.name,pdg.poste),compact(orgName,48),media),true),true);if(dg)relayHTML+=acc('ep-toggle-icon--dg','2','Invitation DG — appui de cadrage',msgBlock('Invitation DG',buildRelay(dg.civ||civNom(dg.name,dg.poste),pdg?(pdg.civ||civNom(pdg.name,pdg.poste)):'',compact(orgName,48),media,'dg'),true),!pdg);if(comex)relayHTML+=acc('ep-toggle-icon--dg','C','Invitation COMEX — appui de cadrage',msgBlock('Invitation COMEX',buildRelay(comex.civ||civNom(comex.name,comex.poste),firstLeaderCiv,compact(orgName,48),media,'comex'),true));if(comm)relayHTML+=acc('ep-toggle-icon--comm','co','Invitation Communication — association en amont',msgBlock('Invitation Communication',buildRelay(comm.civ||civNom(comm.name,comm.poste),firstLeaderCiv,compact(orgName,48),media,'communication'),true));if(ap)relayHTML+=acc('ep-toggle-icon--comm','ap','Invitation Affaires publiques — association en amont',msgBlock('Invitation Affaires publiques',buildRelay(ap.civ||civNom(ap.name,ap.poste),firstLeaderCiv,compact(orgName,48),media,'affaires publiques'),true));if(!relayHTML)relayHTML='<div class="ep-panel ep-warning"><div class="ep-kicker">Appuis non identifiés</div><p class="ep-sub">Aucun PDG, DG, COMEX, communication ou affaires publiques n’est renseigné dans les données disponibles pour cette organisation. Il faut identifier un relais avant de lancer les invitations individuelles.</p></div>';
var posHTML=summaries.map(positionCard).join('');var appuiCards=appuis.map(function(a){return appuiCard(a)}).join('')||'<div class="ep-card"><div class="ep-card-role">Aucun appui renseigné</div><div class="ep-card-meta">À compléter dans le CRM / fichier JS.</div></div>';
var indiv=summaries.map(function(iv,i){return acc('ep-toggle-icon--li','in','Invitation intervenant — '+esc(iv.nomCourt||iv.nom),msgBlock('Invitation intervenant',buildIntervenant(iv,firstLeaderCiv),true),i===0&&!relayHTML)}).join('');
var postAccept='Bonjour, merci pour votre retour. L’idée est d’organiser un court échange éditorial de 15 minutes pour vérifier les lectures pertinentes au sein de '+orgName+', sans engagement à ce stade. Voici le lien : '+CAL;var relance='Bonjour, je me permets une courte relance au sujet des conversations Industrie préparées par Scènes d’Arbitrage. L’objectif est simplement de vérifier si '+orgName+' souhaite explorer une ou plusieurs lectures pertinentes, avant toute note de positionnement.';
var options=(g.options||[]).map(dealSummary).filter(function(iv){return !summaries.some(function(a){return a.ref===iv.ref})});var optHTML='';if(options.length){optHTML='<details class="ep-details"><summary>Positions en option / réserve éditoriale ('+options.length+')</summary><div class="ep-grid" style="margin-top:.8rem">'+options.slice(0,12).map(positionCard).join('')+'</div></details>'}
return '<main class="ep-main"><section class="ep-panel ep-panel--gold"><div class="ep-kicker">Page LinkedIn commune · organisation multi-intervenants</div><h1 class="ep-title">'+esc(orgName)+'</h1><p class="ep-sub">'+summaries.length+' positions actives sont regroupées dans cette page. Les relais internes ne doivent être contactés qu’une seule fois avec une note globale, sans lister tous les intervenants dans l’invitation LinkedIn.</p><div class="ep-tags"><span class="ep-tag ep-tag--accent">'+summaries.length+' intervenants actifs</span><span class="ep-tag ep-tag--green">message organisation unique</span><span class="ep-tag">'+esc(media)+'</span></div></section><section class="ep-section"><div class="ep-section-title">Ordre de contact recommandé</div><div class="ep-panel"><p class="ep-sub">1. PDG / président s’il existe · 2. DG ou COMEX, en signalant l’information du PDG/DG · 3. Communication ou affaires publiques, pour association en amont · 4. Intervenants pressentis, depuis les messages individuels regroupés ci-dessous.</p></div></section><section class="ep-section"><div class="ep-section-title">Appuis internes identifiés</div><div class="ep-grid">'+appuiCards+'</div></section><section class="ep-section"><div class="ep-section-title">Positions actives regroupées</div><div class="ep-grid">'+posHTML+'</div>'+optHTML+'</section><section class="ep-section"><div class="ep-section-title">Scripts — appuis internes / message unique organisation</div><div class="ep-accordion">'+relayHTML+acc('ep-toggle-icon--comm','+','Message post-acceptation relais',msgBlock('Post-acceptation relais',postAccept,false))+acc('ep-toggle-icon--comm','↩','Relance relais',msgBlock('Relance relais',relance,false))+'</div></section><section class="ep-section"><div class="ep-section-title">Scripts — intervenants pressentis sur cette organisation</div><p class="ep-note">Ces messages restent individuels, mais ils sont regroupés ici pour éviter de multiplier les pages internes. Ils doivent être utilisés après le cadrage par relais quand un relais a été identifié.</p><div class="ep-accordion">'+indiv+'</div></section></main>'}
function renderSingle(g,deal){var first=s(deal.publicRef||Core.getDealId(deal));var orgName=s((g.org||{}).name||'Organisation');return '<main class="ep-main"><section class="ep-panel ep-panel--gold"><div class="ep-kicker">Organisation avec un seul intervenant actif</div><h1 class="ep-title">'+esc(orgName)+'</h1><p class="ep-sub">Cette organisation n’a qu’une position active visible dans les données actuelles. Utilisez la page LinkedIn standard pour ce deal.</p><div class="ep-tags"><span class="ep-tag">1 intervenant actif</span><span class="ep-tag ep-tag--accent">'+esc(first)+'</span></div></section><section class="ep-panel"><a class="ep-card-link" href="/lp/industrie/contribuer-linkedin.html?cast='+encodeURIComponent(first)+'">Ouvrir la page LinkedIn standard →</a></section></main>'}
function findGroup(groups){var params=new URLSearchParams(window.location.search||'');var ref=s(params.get('cast')||params.get('ref')||params.get('position')||params.get('p')||'');var orgParam=s(params.get('org')||'');var orgIdParam=s(params.get('orgid')||params.get('orgId')||'');if(ref){var d=Core.getDealById(ref);if(d){var k=groupKey(d);return{group:groups[k],deal:d,ref:ref}}}if(orgIdParam){var hit=Object.values(groups).find(function(g){return s((g.org||{}).id)===orgIdParam});if(hit)return{group:hit,deal:hit.deals[0],ref:s(hit.deals[0].publicRef||Core.getDealId(hit.deals[0]))}}if(orgParam){var wanted=norm(orgParam);var hit2=Object.values(groups).find(function(g){return norm((g.org||{}).name)===wanted||slug((g.org||{}).name)===slug(orgParam)});if(hit2)return{group:hit2,deal:hit2.deals[0],ref:s(hit2.deals[0].publicRef||Core.getDealId(hit2.deals[0]))}}return null}
function init(){Core=window.EnPlateauRenderCore;var app=document.getElementById('app');if(!Core){app.innerHTML='<div class="ep-state">render-core.js introuvable.</div>';return}var groups=buildGroups();var selected=findGroup(groups);if(!selected){app.innerHTML=renderIndex(groups);return}if(!selected.group){app.innerHTML='<div class="ep-state">Dossier trouvé, mais l’organisation n’est pas active dans les critères actuels.</div>';return}if(!selected.group.isMulti){app.innerHTML=renderSingle(selected.group,selected.deal);return}app.innerHTML=renderGroup(selected.group,selected.ref)}
setTimeout(init,200);
window.epToggle=function(btn){btn.closest('.ep-item').classList.toggle('is-open')};
window.epCopy=function(id,btn){var el=document.getElementById(id);var t=el.querySelector('.ep-msg-text');navigator.clipboard.writeText(t?t.innerText:el.innerText).then(function(){btn.textContent='✓ Copié';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copier';btn.classList.remove('copied')},1600)})};
})();
