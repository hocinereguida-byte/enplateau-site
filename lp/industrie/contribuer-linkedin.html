<script>
(function(){

function msgBlock(label,text,showChar){var id='m'+Math.random().toString(36).slice(2);return '<div class="ep-msg" id="'+id+'"><button class="ep-copy-btn" onclick="epCopy(\''+id+'\',this)">Copier</button><div class="ep-msg-header"><span>'+esc(label)+'</span>'+(showChar?charInfo(text):'')+'</div><div class="ep-msg-text">'+esc(text)+'</div></div>'}
function repBlock(label,text){var id='r'+Math.random().toString(36).slice(2);return '<div class="ep-response-item" id="'+id+'"><div class="ep-response-label"><span>'+esc(label)+'</span><button class="ep-copy-btn ep-copy-btn--inline" onclick="epCopyEl(\''+id+'\',this)">Copier</button></div><div class="ep-response-text">'+esc(text)+'</div></div>'}

function truncateWords(v,max){var t=s(v).replace(/\s+/g,' ');if(t.length<=max)return t;var cut=t.slice(0,max-1);var p=cut.lastIndexOf(' ');if(p>45)cut=cut.slice(0,p);return cut.replace(/[\s,;:.!?-]+$/,'')+'…'}
function formatNameToken(t){t=s(t).toLowerCase(); if(!t)return''; if(t.length<=2)return t.toUpperCase(); return t.charAt(0).toUpperCase()+t.slice(1)}
function surnameFromName(full){var parts=s(full).replace(/\s+/g,' ').split(' ').filter(Boolean);if(!parts.length)return'';if(parts.length===1)return formatNameToken(parts[0]);var last=parts.slice(1);var particles={'de':1,'du':1,'des':1,'d':1,'d’':1,"d'":1,'le':1,'la':1,'les':1,'van':1,'von':1};
  // conserve les particules placées juste avant le nom : Godéfroy De Colombe -> De Colombe.
  if(last.length>=2 && particles[last[0].toLowerCase()]) return last.map(formatNameToken).join(' ');
  return last.map(formatNameToken).join(' ');
}
function guessCivilite(full,poste){var first=s(full).split(/\s+/)[0]||'';var f=first.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');var p=norm(poste||'');if(p.includes('presidente')||p.includes('directrice')||p.includes('dirigeante'))return'Mme';if(PRENOMS_FEMININS.indexOf(f)>=0)return'Mme';return'M.'}
function civNom(full,poste){var sur=surnameFromName(full);if(!sur)return'';return guessCivilite(full,poste)+' '+sur}
function samePerson(a,b){return norm(a) && norm(a)===norm(b)}
function formatContactList(list){var arr=list.filter(Boolean);if(arr.length===0)return'';if(arr.length===1)return arr[0];if(arr.length===2)return arr[0]+' et '+arr[1];return arr.slice(0,-1).join(', ')+' et '+arr[arr.length-1]}
function publicationVerb(n){return n>1?'diffusées':'diffusée'}
function mediaForDeals(deals,fallback){var vals=[];(deals||[]).forEach(function(d){var a=Core.getAngleByCode(Core.getAngleCodeFromDeal(d));var m=s(a&&a.media||'');if(m&&vals.indexOf(m)<0)vals.push(m)});if(!vals.length&&fallback)vals=[fallback];if(vals.length<=1)return vals[0]||'';return vals.slice(0,2).join(' / ')+(vals.length>2?' / autres médias':'')}
function makeObjetCourt(text){var t=s(text).replace(/[?]+$/,'').replace(/\s+/g,' ');
  t=t.replace(/^Comment\s+/i,'');
  t=t.replace(/^À partir de quand\s+/i,'le moment où ');
  t=t.replace(/^A partir de quand\s+/i,'le moment où ');
  t=t.replace(/^Où\s+/i,'les points où ');
  t=t.replace(/^Ou\s+/i,'les points où ');
  t=t.replace(/^Jusqu[’']où\s+/i,'les limites où ');
  t=t.replace(/^Qu[’']est-ce qui fait qu[’']une\s+/i,'ce qui fait tenir une ');
  t=t.replace(/^Qu[’']est-ce qui fait que\s+/i,'ce qui fait que ');

function firstUnder300(candidates){for(var i=0;i<candidates.length;i++){var c=s(candidates[i]);if(c.length<=300)return c}var last=s(candidates[candidates.length-1]||'');return trimNoEllipsis(last,297)}
function trimNoEllipsis(v,max){var t=s(v).replace(/…/g,'').replace(/\.\.\./g,'').replace(/\s+/g,' ');if(t.length<=max)return t;var cut=t.slice(0,max);var p=cut.lastIndexOf(' ');if(p>45)cut=cut.slice(0,p);return cut.replace(/[\s,;:.!?-]+$/,'')}
function rangNum(d){var a=d&&d.activation||{};var r=parseInt(a.rang||d.rang||'',10);return isNaN(r)?999:r}
function isReserveLike(d){var a=d&&d.activation||{};var status=norm(a.activationStatus||d.activationStatus||d.dealTitle||a.prioriteCandidat||a.fitLecture||'');var type=norm(a.typeDeal||d.typeDeal||'');var incl=norm(a.inclusionWaalaxy||a.inclusion_waalaxy||d.inclusionWaalaxy||'');var r=rangNum(d);return status.includes('reserve')||status.includes('réserve')||status.includes('trace crm')||status.includes('non activable')||type.includes('secondaire')||incl.includes('non')||r>=11}
function visibleActiveDeal(d){if(!d)return false;if(Core.isExcludedDeal&&Core.isExcludedDeal(d))return false;var a=d.activation||{};var type=norm(a.typeDeal||d.typeDeal||'');var incl=norm(a.inclusionWaalaxy||a.inclusion_waalaxy||d.inclusionWaalaxy||'');var r=rangNum(d);if(type.includes('principal'))return true;if(incl.includes('oui'))return true;if(r>=1&&r<=10&&!isReserveLike(d))return true;return false}
function optionDeal(d){if(!d)return false;if(Core.isExcludedDeal&&Core.isExcludedDeal(d))return false;if(visibleActiveDeal(d))return false;return isReserveLike(d)}
function orgKey(d){var o=Core.getOrganisation(d)||{};return s(o.id)||norm(o.name)}

function getEnrichment(pubRef){var rows=window.INDUSTRIE_ENRICHMENTS||[];var wanted=norm(pubRef);for(var i=0;i<rows.length;i++){if(norm(rows[i].publicRef||rows[i].cast||rows[i].ref)===wanted)return rows[i].enrichment||{}}return{}}

function shortObjetMessage(text,conversation,lecture){var base=trimNoEllipsis(makeObjetCourt(text),90);var n=norm(base+' '+conversation+' '+lecture);if(base.length<=84)return base;if(n.includes('systeme')||n.includes('systemes'))return'l’évolution des systèmes industriels';if(n.includes('investissement'))return'les arbitrages d’investissement industriel';if(n.includes('metier')||n.includes('competence'))return'l’évolution des métiers et compétences industriels';if(n.includes('capacite')||n.includes('flux'))return'les arbitrages de capacité et de flux industriels';if(n.includes('interdependance')||n.includes('dependance'))return'les interdépendances industrielles critiques';if(n.includes('outil industriel'))return'l’évolution de l’outil industriel';if(n.includes('trajectoire'))return'la tenue d’une trajectoire industrielle';return trimNoEllipsis(base,76)}

function compactOrgName(name){return truncateWords(s(name),44)}

function addAppui(list,item,person){if(!item||!s(item.name))return;if(person&&samePerson(item.name,person.fullName||person.name))return;var key=item.kind+'|'+norm(item.name);if(list.some(function(x){return x.key===key}))return;item.key=key;list.push(item)}

function init(){

  var mediaLine=[journaliste,media].filter(Boolean).join(', ');
  var mediasCount=orgMedia.indexOf('/')>=0?2:1;

  // Lectures complémentaires
  var compCodes=angle&&angle.complementaryCodes||[];
  var autresLectures=[];

  var toutesLectures=autresLectures.concat([lecLabel]);

  var prealableInterv=contactPrealableComm;

  var inv_ap=ap?(multiOrg?buildMultiAppui(civNom(ap.name,ap.poste),contactPrealableComm,orgNomCourt,orgMedia,'affaires publiques'):buildSingleAppui(civNom(ap.name,ap.poste),contactPrealableComm||nomCourt,nomCourt,lecLabel,objetMsg,media||orgMedia,'affaires publiques')):'';

  var msg_interv='Bonjour,\n\nScènes d’Arbitrage compose une conversation du cycle Industrie sur : « '+angleTexte+' ».\n\nLa lecture '+lecLabel+' est celle qui nous a conduit vers vous'+(whyShort?' — '+whyShort:'')+'.'+(prealableInterv?'\n\nNous avons informé en amont '+prealableInterv+' afin que la sollicitation soit correctement située.':'')+'\n\nLa contribution ne suppose pas de commenter une situation interne. Elle vise une lecture de mécanisme, préparée et publiquement tenable.\n\nPage de cadrage : '+landingURL+'\nÉchange éditorial de 15 min : '+CAL;
  var rel_interv='Bonjour, je me permets une relance courte.\n\nLa lecture '+lecLabel+' reste ouverte dans cette composition. Seriez-vous disponible pour un échange de 15 minutes ?\n\nPage de cadrage : '+landingURL+'\nCréneau possible ici : '+CAL;
  var msg_appui='Bonjour,\n\nScènes d’Arbitrage compose le cycle Industrie autour de conversations courtes et préparées, diffusées sur des médias partenaires.\n\n'+orgNom+' nous semble pouvoir apporter une lecture utile sur un ou plusieurs angles. L’objectif n’est pas de commenter une situation interne, mais de formuler une lecture de mécanisme, publiquement tenable.\n\nSi le sujet devait être exploré, je souhaiterais vous associer en amont.\n\nPage de cadrage : '+landingURL+'\n15 minutes si utile : '+CAL;
  var rel_appui='Bonjour, je me permets une relance courte.\n\nSouhaitez-vous que nous vérifiions si '+orgNom+' peut occuper une position pertinente dans cette composition ?\n\nPage de cadrage : '+landingURL+'\n15 min si utile : '+CAL;
  var rel_comm='Bonjour, je me permets une relance courte.\n\nSi le sujet avance, je souhaiterais associer la communication en amont afin de cadrer précisément le périmètre de parole.\n\nPage de cadrage : '+landingURL;

  var rep_courte='Avec plaisir — tout est sur la page de cadrage : '+landingURL+'\n\nSi vous souhaitez en parler : '+CAL;
  var rep_moy='Merci pour votre retour. Un échange de 15 minutes permettrait de vérifier si la lecture s\'inscrit bien dans la composition et de clarifier les conditions de préparation.\n\nPage de cadrage : '+landingURL+'\nRéserver un créneau : '+CAL;
  var rep_neg='Je comprends tout à fait. Si la situation évolue ou si un autre interlocuteur vous semble plus adapté chez '+orgNom+', n’hésitez pas à me le signaler.';

  var lecturesBadges=autresLectures.map(function(l){return'<span class="ep-lecture-badge">'+esc(l)+'</span>'}).join('')+'<span class="ep-lecture-badge ep-lecture-badge--main">'+esc(lecLabel)+' ←</span>';

  var appuiHTML='';

    if(appuis.length){
      appuiHTML='<div class="ep-appui">';

      appuiHTML='<div class="ep-why-block"><div class="ep-why-label">Appuis internes</div><div class="ep-why-text">Aucun relais dirigeant, communication ou affaires publiques n’est identifié dans les données disponibles pour ce dossier.</div></div>';
    }
    if(multiOrg){appuiHTML+='<div class="ep-why-block"><div class="ep-why-label">Message unique organisation</div><div class="ep-why-text">'+esc(orgNom)+' apparaît sur '+orgDeals.length+' positions actives visibles. Les relais internes ne doivent être contactés qu’une seule fois pour l’organisation, avec une note globale, sans lister tous les intervenants.</div></div>'}
    var list=orgDeals.map(dealSummary);

    var optionList=orgOptionDeals.map(dealSummary);

  app.innerHTML='<main class="ep-main"><div class="ep-identity"><div><div class="ep-identity-name">'+esc(nomCourt||nomComplet)+'</div><div class="ep-identity-role">'+esc(roleP)+'</div><div class="ep-identity-org">'+esc(orgNom)+'</div><div class="ep-tags"><span class="ep-tag '+(conseil?'ep-tag--conseil':'ep-tag--indus')+'">'+(conseil?'Cabinet · Conseil':'Industrie')+'</span><span class="ep-tag ep-tag--lecture">'+esc(lecLabel)+'</span><span class="ep-tag ep-tag--rang">Rang '+rang+'</span>'+(appuis.length?'<span class="ep-tag ep-tag--dg">Appuis identifiés</span>':'')+(multiOrg?'<span class="ep-tag ep-tag--comm">Message org unique</span>':'')+'</div></div><div class="ep-ref"><div style="margin-bottom:.4rem">'+esc(pubRef)+'</div>'+(person.linkedin?'<a href="'+esc(person.linkedin)+'" target="_blank" style="color:var(--bleu-li);font-size:.7rem;text-decoration:none">Profil LinkedIn →</a>':'')+'</div></div><div class="ep-angle-card"><div class="ep-angle-label">Angle éditorial</div><div class="ep-angle-text">'+esc(angleTexte)+'</div><div class="ep-angle-meta"><span>📡 '+esc(conversation)+'</span><span>⚡ '+esc(contexte)+'</span>'+(mediaLine?'<span>🎙 '+esc(mediaLine)+'</span>':'')+'</div><div class="ep-lectures-list">'+lecturesBadges+'</div></div>'+(appuiHTML?'<div class="ep-section"><div class="ep-section-title">Appuis et positions organisationnelles</div>'+appuiHTML+'</div>':'')+(relayAccordion?'<div class="ep-section"><div class="ep-section-title">Scripts — appuis internes / messages uniques</div><div class="ep-accordion">'+relayAccordion+'</div></div>':'')+'<div class="ep-section"><div class="ep-section-title">Scripts — Intervenant</div><div class="ep-accordion">'+acc('ep-toggle-icon--li','in','Invitation intervenant &nbsp;<small style="color:var(--gris-4);font-weight:400">≤ 300 car.</small>',msgBlock('Invitation intervenant',inv_interv,true),!relayAccordion)+acc('ep-toggle-icon--li','+','Message post-acceptation intervenant',msgBlock('Post-acceptation intervenant',msg_interv,false))+acc('ep-toggle-icon--li','↩','Relance intervenant',msgBlock('Relance intervenant',rel_interv,false))+'</div></div><div class="ep-section"><div class="ep-section-title">Réponses rapides</div><div class="ep-accordion">'+acc('ep-toggle-icon--rep','✓','Réponses pré-rédigées',repHTML)+'</div></div><div class="ep-section"><div class="ep-section-title">Justification éditoriale</div><div class="ep-accordion">'+acc('ep-toggle-icon--why','?','Pourquoi cette organisation et cette personne ?',whyHTML)+'</div></div></main>';
