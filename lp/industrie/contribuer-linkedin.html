<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>En Plateau — Scripts LinkedIn</title>
  <meta name="robots" content="noindex,nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--noir:#111;--gris-1:#1e1e1e;--gris-2:#2a2a2a;--gris-3:#3d3d3d;--gris-4:#6b6b6b;--gris-5:#a8a8a8;--gris-6:#e8e8e8;--blanc:#fafafa;--accent:#c8a96e;--accent2:#7c9b8a;--rouge:#c0392b;--bleu-li:#0a66c2;--radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--serif:'Playfair Display',serif}
    html{font-size:15px}
    body{font-family:var(--sans);background:var(--noir);color:var(--blanc);min-height:100vh;line-height:1.6}
    .ep-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--gris-2);background:var(--gris-1);position:sticky;top:0;z-index:100}
    .ep-brand{font-family:var(--serif);font-size:1.1rem;color:var(--accent);text-decoration:none}
    .ep-badge{font-family:var(--mono);font-size:.7rem;color:var(--gris-4);border:1px solid var(--gris-3);padding:.2rem .6rem;border-radius:20px}
    .ep-state{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;color:var(--gris-4);font-family:var(--mono);font-size:.85rem}
    .ep-dot-spin{width:32px;height:32px;border:2px solid var(--gris-3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ep-main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}
    .ep-identity{background:var(--gris-1);border:1px solid var(--gris-2);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start}
    .ep-identity-name{font-family:var(--serif);font-size:1.4rem;color:var(--blanc);margin-bottom:.2rem}
    .ep-identity-role{font-size:.85rem;color:var(--gris-5);margin-bottom:.8rem}
    .ep-identity-org{font-size:.9rem;font-weight:600;color:var(--accent)}
    .ep-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.8rem}
    .ep-tag{font-family:var(--mono);font-size:.65rem;padding:.2rem .55rem;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;border:1px solid}
    .ep-tag--conseil{color:#a8d5a2;border-color:#a8d5a2}
    .ep-tag--indus{color:#f0c987;border-color:#f0c987}
    .ep-tag--lecture{color:#a8c4d5;border-color:#a8c4d5}
    .ep-tag--rang{color:var(--gris-4);border-color:var(--gris-3)}
    .ep-tag--dg{color:#f0c987;border-color:#f0c987}
    .ep-tag--comm{color:#a8d5c2;border-color:#a8d5c2}
    .ep-ref{font-family:var(--mono);font-size:.7rem;color:var(--gris-4);text-align:right}
    .ep-angle-card{background:var(--gris-2);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.2rem;margin-bottom:2rem}
    .ep-angle-label{font-family:var(--mono);font-size:.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
    .ep-angle-text{font-family:var(--serif);font-size:1rem;font-style:italic;color:var(--blanc);line-height:1.5}
    .ep-angle-meta{margin-top:.6rem;font-size:.78rem;color:var(--gris-5);display:flex;gap:1.2rem;flex-wrap:wrap}
    .ep-lectures-list{margin-top:.8rem;display:flex;flex-wrap:wrap;gap:.4rem}
    .ep-lecture-badge{font-family:var(--mono);font-size:.65rem;padding:.2rem .5rem;border-radius:4px;border:1px solid var(--gris-3);color:var(--gris-5)}
    .ep-lecture-badge--main{border-color:var(--accent);color:var(--accent);font-weight:600}
    .ep-section{margin-bottom:1.5rem}
    .ep-section-title{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gris-4);border-bottom:1px solid var(--gris-2);padding-bottom:.5rem;margin-bottom:1rem}
    .ep-accordion{display:flex;flex-direction:column;gap:.5rem}
    .ep-item{border:1px solid var(--gris-2);border-radius:var(--radius);overflow:hidden}
    .ep-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;background:var(--gris-1);cursor:pointer;border:none;color:var(--blanc);font-family:var(--sans);font-size:.88rem;font-weight:500;text-align:left;gap:1rem;transition:background .15s}
    .ep-toggle:hover{background:var(--gris-2)}
    .ep-toggle-left{display:flex;align-items:center;gap:.7rem}
    .ep-toggle-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
    .ep-toggle-icon--li{background:var(--bleu-li);color:#fff}
    .ep-toggle-icon--dg{background:var(--accent);color:var(--noir)}
    .ep-toggle-icon--comm{background:var(--accent2);color:#fff}
    .ep-toggle-icon--why{background:var(--gris-3);color:var(--gris-5)}
    .ep-toggle-icon--rep{background:var(--accent2);color:#fff}
    .ep-chevron{font-size:.7rem;color:var(--gris-4);transition:transform .2s;flex-shrink:0}
    .ep-item.is-open .ep-chevron{transform:rotate(180deg)}
    .ep-body{background:var(--gris-1);padding:0;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
    .ep-item.is-open .ep-body{max-height:3000px;padding:1rem}
    .ep-msg-header{font-family:var(--mono);font-size:.65rem;color:var(--gris-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between}
    .ep-char-count{font-family:var(--mono);font-size:.65rem;padding:.15rem .4rem;border-radius:4px}
    .ep-char-count--ok{color:var(--accent2);background:rgba(124,155,138,.15)}
    .ep-char-count--warn{color:var(--accent);background:rgba(200,169,110,.15)}
    .ep-char-count--over{color:var(--rouge);background:rgba(192,57,43,.15)}
    .ep-msg{position:relative;background:var(--noir);border:1px solid var(--gris-2);border-radius:var(--radius);padding:1rem 1rem .8rem;margin-bottom:.8rem}
    .ep-msg-text{font-size:.85rem;line-height:1.75;color:var(--gris-6);white-space:pre-wrap;font-family:var(--sans);padding-top:.4rem}
    .ep-copy-btn{position:absolute;top:.6rem;right:.6rem;background:var(--gris-2);border:1px solid var(--gris-3);color:var(--gris-5);border-radius:4px;padding:.25rem .6rem;font-family:var(--mono);font-size:.65rem;cursor:pointer;transition:all .15s}
    .ep-copy-btn:hover{background:var(--gris-3);color:var(--blanc)}
    .ep-copy-btn.copied{color:var(--accent2);border-color:var(--accent2)}
    .ep-copy-btn--inline{position:static;margin-left:auto}
    .ep-why-block{background:var(--noir);border:1px solid var(--gris-2);border-radius:var(--radius);padding:1rem;margin-bottom:.6rem}
    .ep-why-label{font-family:var(--mono);font-size:.65rem;color:var(--gris-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
    .ep-why-text{font-size:.85rem;color:var(--gris-5);line-height:1.65}
    .ep-appui{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.8rem}
    .ep-appui-card{background:var(--noir);border:1px solid var(--gris-2);border-radius:var(--radius);padding:.7rem .9rem}
    .ep-appui-role{font-family:var(--mono);font-size:.6rem;color:var(--gris-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
    .ep-appui-name{color:var(--blanc);font-weight:500;font-size:.85rem}
    .ep-responses{display:flex;flex-direction:column;gap:.8rem}
    .ep-response-item{background:var(--noir);border:1px solid var(--gris-2);border-radius:var(--radius);padding:.8rem 1rem}
    .ep-response-label{font-family:var(--mono);font-size:.62rem;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;display:flex;justify-content:space-between;align-items:center}
    .ep-response-text{font-size:.85rem;color:var(--gris-6);line-height:1.6;white-space:pre-wrap}
    .ep-note{font-size:.78rem;color:var(--gris-4);font-style:italic;margin-bottom:.6rem}
    @media(max-width:600px){.ep-identity,.ep-appui{grid-template-columns:1fr}.ep-main{padding:1.2rem 1rem 3rem}}
  </style>
</head>

<script>
(function(){
'use strict';
var CAL='https://cal.com/en-plateau/echange-editorial-15-min?overlayCalendar=true';
var LECS={'FINANCIERE':'financière','OPERATIONNELLE':'opérationnelle','TECHNOLOGIQUE':'technologique','JURIDIQUE':'juridique','RH_COMPETENCES':'RH & compétences','TERRITORIALE':'territoriale','ENERGIE_RESSOURCES':'énergie & ressources','STRATEGIQUE':'stratégique','Financière':'financière','Opérationnelle':'opérationnelle','Technologique / systèmes':'technologique','Juridique / réglementaire':'juridique','RH / compétences':'RH & compétences','Territoriale':'territoriale','Énergie / Ressources / décarbonation':'énergie & ressources','Stratégique':'stratégique'};
function s(v){return String(v||'').trim()}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function lec(c){return LECS[c]||s(c).toLowerCase()}
function charInfo(t){var n=t.length,cl=n<=260?'ok':n<=290?'warn':'over';return '<span class="ep-char-count ep-char-count--'+cl+'">'+n+' / 300</span>'}
function shortWhy(w){var t=s(w);if(!t)return'';var f=t.split(/\.\s+/)[0].replace(/^Au regard de sa fonction[^,]+,\s*/i,'').trim();return f.length>120?f.substring(0,117)+'…':f}
function msgBlock(label,text,showChar){var id='m'+Math.random().toString(36).slice(2,8);return'<div class="ep-msg-header"><span>'+label+'</span>'+(showChar?charInfo(text):'')+'</div><div class="ep-msg" id="'+id+'"><button class="ep-copy-btn" onclick="epCopy(\''+id+'\',this)">Copier</button><div class="ep-msg-text">'+esc(text)+'</div></div>'}
function acc(iClass,icon,title,body,open){return'<div class="ep-item'+(open?' is-open':'')+'"><button class="ep-toggle" onclick="epToggle(this)"><span class="ep-toggle-left"><span class="ep-toggle-icon '+iClass+'">'+icon+'</span><span>'+title+'</span></span><span class="ep-chevron">▼</span></button><div class="ep-body">'+body+'</div></div>'}
function repBlock(label,text){var id='r'+Math.random().toString(36).slice(2,8);return'<div class="ep-response-item"><div class="ep-response-label"><span>'+label+'</span><button class="ep-copy-btn ep-copy-btn--inline" onclick="epCopyEl(\''+id+'\',this)">Copier</button></div><div class="ep-response-text" id="'+id+'">'+esc(text)+'</div></div>'}

function init(){
  var Core=window.EnPlateauRenderCore;
  if(!Core){setTimeout(init,120);return}
  var app=document.getElementById('app');
  var ref=Core.getPublicReference();
  if(!ref){app.innerHTML='<div class="ep-state"><span>Ajoutez <code>?cast=XXXXXXX</code> dans l\'URL</span></div>';return}
  var deal=Core.getDealById(ref);
  if(!deal){app.innerHTML='<div class="ep-state"><span>Dossier <code>'+esc(ref)+'</code> introuvable.</span></div>';return}

  var angle=Core.getAngleByCode(Core.getAngleCodeFromDeal(deal));
  var person=Core.getPerson(deal);
  var org=Core.getOrganisation(deal);
  var why=Core.getWhy(deal);
  var sc=deal.sourceCastingV6||{};

  var nomComplet=s(person.fullName);
  var roleP=s(person.role);
  var orgNom=s(org.name);
  var conseil=org.type==='cabinet_conseil';
  var typeLec=s(deal.editorialContext&&deal.editorialContext.typeLecture||'');
  var lecLabel=lec(typeLec);
  var angleTexte=s(deal.editorialContext&&(deal.editorialContext.tensionCentrale||deal.editorialContext.angle)||'');
  var conversation=s(deal.editorialContext&&deal.editorialContext.conversation||'');
  var contexte=s(deal.editorialContext&&deal.editorialContext.contexte||'');
  var pubRef=s(deal.publicRef||ref);
  var rang=deal.activation&&deal.activation.rang||'—';
  var landingURL='https://enplateau.fr/lp/industrie/contribuer.html?cast='+pubRef;
  var journaliste=s(angle&&angle.journaliste||'');
  var media=s(angle&&angle.media||'');
  var whyShort=shortWhy(why.person);
  var dgMsg=s(angle&&angle.activationPersonaFit&&angle.activationPersonaFit.organizationLayer&&angle.activationPersonaFit.organizationLayer.dgReadableMessage||'');

  var dgNom=s(sc.pdg_nom||sc.dg_nom||'');
  var dgPoste=s(sc.pdg_poste||sc.dg_poste||'');
  var commPoste=s(sc.comm_poste||'');
  var intervOrg=sc.intervenants_org||[];
  var dgLi=s(sc.pdg_linkedin||sc.dg_linkedin||'');
  var commNom=s(sc.comm_nom||'');
  var commLi=s(sc.comm_linkedin||'');
  var hasDG=!!dgNom;
  var hasComm=!!commNom;
  var prenomDG=dgNom.split(' ')[0];

  // Lectures complémentaires
  var compCodes=angle&&angle.complementaryCodes||[];
  var autresLectures=[];
  compCodes.forEach(function(code){
    var a=Core.getAngleByCode(code);
    var t=s(a&&(a.typeLecture||a.type_lecture)||'');
    var l=lec(t);
    if(l&&l!==lecLabel&&autresLectures.indexOf(l)<0)autresLectures.push(l);
  });
  var toutesLectures=autresLectures.concat([lecLabel]);
  var lecturesStr=toutesLectures.length>1?toutesLectures.slice(0,-1).join(', ')+' et '+toutesLectures[toutesLectures.length-1]:lecLabel;
  var mediaLine=[journaliste,media].filter(Boolean).join(', ');

  // ── SCRIPTS ──
  var inv_interv='Bonjour, je vous contacte pour En Plateau. Nous préparons une conversation du cycle Industrie sur la montée en capacité industrielle et votre fonction nous semble bien placée pour en porter la lecture '+lecLabel+'.';

  var msg_interv='Bonjour,\n\nNous composons une conversation sur les conditions concrètes de montée en capacité industrielle : flux, priorités, qualité, interfaces métiers et stabilité d\'exécution.\n\nQuatre lectures structurent cette composition — '+lecturesStr+' — portées par des directions de groupes industriels, d\'ETI et de cabinets spécialisés.\n\nLa lecture '+lecLabel+' est celle qui nous a conduit vers vous'+(whyShort?' — '+whyShort:'')+'.'+((hasDG||hasComm)?'\n\nNous avons informé en amont '+(hasDG?prenomDG:commNom.split(' ')[0])+' afin que la sollicitation soit correctement située.':'')+'\n\nLa contribution ne suppose pas de commenter une situation interne. Elle vise une lecture de mécanisme, préparée et publiquement tenable.\n\nNous serions ravis de vous associer à cette démarche, y compris lors de l\'échange éditorial.\n\nPage de cadrage : '+landingURL+'\nÉchange éditorial de 15 min : '+CAL;

  var rel_interv='Bonjour, je me permets une relance courte.\n\nLa lecture '+lecLabel+' reste ouverte dans cette composition. Seriez-vous disponible pour un échange de 15 minutes ?\n\nPage de cadrage : '+landingURL+'\nCréneau possible ici : '+CAL;

  var inv_dg='Bonjour, je vous contacte pour En Plateau. Nous préparons une conversation du cycle Industrie sur la montée en capacité industrielle et souhaitons situer une possible lecture de '+orgNom+'.';

  var msg_dg='Bonjour,\n\nNous composons une conversation sur les conditions concrètes de montée en capacité industrielle : flux, priorités, qualité, interfaces métiers et stabilité d\'exécution.\n\nQuatre lectures structurent cette composition — '+lecturesStr+' — portées par des directions de groupes industriels, d\'ETI et de cabinets spécialisés.\n\n'+orgNom+' nous semble pouvoir apporter une lecture '+lecLabel+' utile sur ce sujet. Nous avons identifié '+nomComplet+' pour la porter — '+(whyShort||'sa fonction lui permet d\'apporter une lecture utile sur cet angle')+'.\n\nPensez-vous que ce soit la personne la plus appropriée, ou souhaitez-vous nous orienter vers quelqu\'un de plus pertinent en interne ?\n\nLa contribution ne suppose pas de commenter une situation interne. Elle vise une lecture de mécanisme, préparée et publiquement tenable.\n\nNous serions ravis de vous associer à cette démarche, y compris lors de l\'échange éditorial.\n\nPage de cadrage : '+landingURL+'\n15 minutes si utile : '+CAL;

  var rel_dg='Bonjour, je me permets une relance courte.\n\n'+orgNom+' a-t-elle un intérêt à occuper cette position dans la composition ?\n\nPage de cadrage : '+landingURL+'\n15 min si utile : '+CAL;

  var inv_comm='Bonjour, je vous contacte pour En Plateau. Nous préparons une conversation Industrie et souhaitons vérifier le cadrage d\'une possible sollicitation de '+orgNom+'.';

  var msg_comm='Bonjour,\n\nNous composons une conversation sur la montée en capacité industrielle — quatre lectures associées : '+lecturesStr+', portées par des directions de groupes, d\'ETI et de cabinets spécialisés.\n\n'+(hasDG?'Nous avons pris contact avec '+prenomDG+' pour situer la démarche. ':'')+' Nous avons identifié '+nomComplet+' pour porter la lecture '+lecLabel+' de '+orgNom+' — '+(whyShort||'sa fonction lui permet d\'apporter une lecture utile sur cet angle')+'.\n\nPensez-vous que ce soit la personne la plus appropriée, ou souhaitez-vous nous orienter vers quelqu\'un de plus pertinent en interne ?\n\nL\'objectif n\'est pas de commenter une situation interne, mais de préparer une lecture de mécanisme, publiquement tenable, avec un périmètre maîtrisé.\n\nNous serions ravis de vous associer à cette démarche, y compris lors de l\'échange éditorial.\n\nPage de cadrage : '+landingURL+'\n15 minutes si utile : '+CAL;

  var rel_comm='Bonjour, je me permets une relance courte.\n\n'+orgNom+' a-t-elle un intérêt à occuper cette position dans la composition ?\n\nPage de cadrage : '+landingURL+'\n15 min si utile : '+CAL;

  var rep_courte='Avec plaisir — tout est sur la page de cadrage : '+landingURL+'\n\nSi vous souhaitez en parler : '+CAL;
  var rep_moy='Merci pour votre retour. Un échange de 15 minutes permettrait de vérifier si la lecture s\'inscrit bien dans la composition et de clarifier les conditions de préparation.\n\nPage de cadrage : '+landingURL+'\nRéserver un créneau : '+CAL;
  var rep_neg='Je comprends tout à fait. Si la situation évolue ou si un autre interlocuteur vous semble plus adapté chez '+orgNom+', n\'hésitez pas à me le signaler.';

  // ── BADGES LECTURES ──
  var lecturesBadges=autresLectures.map(function(l){return'<span class="ep-lecture-badge">'+esc(l)+'</span>'}).join('')+'<span class="ep-lecture-badge ep-lecture-badge--main">'+esc(lecLabel)+' ←</span>';

  // ── APPUIS ──
  var appuiHTML='';
  if(hasDG||hasComm){
    appuiHTML='<div class="ep-appui">';
    if(hasDG)appuiHTML+='<div class="ep-appui-card">'+'<div class="ep-appui-role">DG / PDG — message envoyé à</div>'+'<div class="ep-appui-name">'+esc(dgNom)+'</div>'+(dgPoste?'<div style="font-size:.78rem;color:var(--gris-5);margin-top:.1rem">'+esc(dgPoste)+'</div>':'')+(dgLi?'<div style="margin-top:.3rem"><a href="'+esc(dgLi)+'" target="_blank" style="color:var(--bleu-li);font-size:.75rem;text-decoration:none">LinkedIn →</a></div>':'')+'</div>';
    if(hasComm)appuiHTML+='<div class="ep-appui-card">'+'<div class="ep-appui-role">DirCom — message envoyé à</div>'+'<div class="ep-appui-name">'+esc(commNom)+'</div>'+(commPoste?'<div style="font-size:.78rem;color:var(--gris-5);margin-top:.1rem">'+esc(commPoste)+'</div>':'')+(commLi?'<div style="margin-top:.3rem"><a href="'+esc(commLi)+'" target="_blank" style="color:var(--bleu-li);font-size:.75rem;text-decoration:none">LinkedIn →</a></div>':'')+'</div>';
    appuiHTML+='</div>';
  if(intervOrg.length>0){
    appuiHTML+='<div style="margin-top:.8rem">';
    appuiHTML+='<div class="ep-why-label" style="margin-bottom:.5rem">Intervenants positionnés chez '+esc(orgNom)+'</div>';
    intervOrg.forEach(function(iv){
      var isSelf=(iv.pub_ref===pubRef);
      appuiHTML+='<div class="ep-appui-card" style="margin-bottom:.4rem;'+(isSelf?'border-color:var(--accent);':'')+'">'
        +'<div class="ep-appui-role">'+esc(iv.lecture)+' · '+esc(iv.conversation)+'</div>'
        +'<div class="ep-appui-name">'+esc(iv.nom)+(isSelf?' <span style="font-size:.65rem;color:var(--accent);margin-left:.3rem">(ce dossier)</span>':'')+'</div>'
        +'<div style="font-size:.78rem;color:var(--gris-5);margin-top:.1rem">'+esc(iv.poste)+'</div>'
        +(iv.linkedin?'<div style="margin-top:.3rem"><a href="'+esc(iv.linkedin)+'" target="_blank" style="color:var(--bleu-li);font-size:.75rem;text-decoration:none">LinkedIn →</a></div>':'')
        +'</div>';
    });
    appuiHTML+='</div>';
  }
  }

  var repHTML='<p class="ep-note">Si la personne marque de l\'intérêt sans s\'engager :</p><div class="ep-responses" style="margin-bottom:1rem">'+repBlock('Courte',rep_courte)+repBlock('Avec proposition de RDV',rep_moy)+'</div><p class="ep-note">Si la personne décline :</p><div class="ep-responses">'+repBlock('Clôture',rep_neg)+'</div>';

  var whyHTML='<div class="ep-why-block"><div class="ep-why-label">Pourquoi '+esc(orgNom)+' ?</div><div class="ep-why-text">'+esc(why.organisation||'—')+'</div></div><div class="ep-why-block"><div class="ep-why-label">Pourquoi '+esc(nomComplet)+' ?</div><div class="ep-why-text">'+esc(why.person||'—')+'</div></div><div class="ep-why-block"><div class="ep-why-label">Pourquoi cette position ?</div><div class="ep-why-text">'+esc(why.position||'—')+'</div></div>'+(dgMsg?'<div class="ep-why-block"><div class="ep-why-label">Message DG (depuis l\'angle)</div><div class="ep-why-text">'+esc(dgMsg)+'</div></div>':'');

  app.innerHTML='<main class="ep-main"><div class="ep-identity"><div><div class="ep-identity-name">'+esc(nomComplet)+'</div><div class="ep-identity-role">'+esc(roleP)+'</div><div class="ep-identity-org">'+esc(orgNom)+'</div><div class="ep-tags"><span class="ep-tag '+(conseil?'ep-tag--conseil':'ep-tag--indus')+'">'+(conseil?'Cabinet · Conseil':'Industrie')+'</span><span class="ep-tag ep-tag--lecture">'+esc(lecLabel)+'</span><span class="ep-tag ep-tag--rang">Rang '+rang+'</span>'+(hasDG?'<span class="ep-tag ep-tag--dg">DG identifié</span>':'')+(hasComm?'<span class="ep-tag ep-tag--comm">Comm identifiée</span>':'')+'</div></div><div class="ep-ref"><div style="margin-bottom:.4rem">'+esc(pubRef)+'</div>'+(person.linkedin?'<a href="'+esc(person.linkedin)+'" target="_blank" style="color:var(--bleu-li);font-size:.7rem;text-decoration:none">Profil LinkedIn →</a>':'')+'</div></div><div class="ep-angle-card"><div class="ep-angle-label">Angle éditorial</div><div class="ep-angle-text">'+esc(angleTexte)+'</div><div class="ep-angle-meta"><span>📡 '+esc(conversation)+'</span><span>⚡ '+esc(contexte)+'</span>'+(mediaLine?'<span>🎙 '+esc(mediaLine)+'</span>':'')+'</div><div class="ep-lectures-list">'+lecturesBadges+'</div></div>'+(appuiHTML?'<div class="ep-section"><div class="ep-section-title">Appuis identifiés</div>'+appuiHTML+'</div>':'')+'<div class="ep-section"><div class="ep-section-title">Scripts — Intervenant</div><div class="ep-accordion">'+acc('ep-toggle-icon--li','in','Invitation &nbsp;<small style="color:var(--gris-4);font-weight:400">≤ 300 car.</small>',msgBlock('Invitation',inv_interv,true),true)+acc('ep-toggle-icon--li','+','Message post-acceptation',msgBlock('Post-acceptation',msg_interv,false))+acc('ep-toggle-icon--li','↩','Relance',msgBlock('Relance',rel_interv,false))+'</div></div>'+(hasDG?'<div class="ep-section"><div class="ep-section-title">Scripts — DG / PDG ('+esc(dgNom)+')</div><div class="ep-accordion">'+acc('ep-toggle-icon--dg','in','Invitation DG &nbsp;<small style="color:var(--gris-4);font-weight:400">≤ 300 car.</small>',msgBlock('Invitation DG',inv_dg,true))+acc('ep-toggle-icon--dg','+','Message post-acceptation DG',msgBlock('Post-acceptation DG',msg_dg,false))+acc('ep-toggle-icon--dg','↩','Relance DG',msgBlock('Relance DG',rel_dg,false))+'</div></div>':'')+(hasComm?'<div class="ep-section"><div class="ep-section-title">Scripts — DirCom ('+esc(commNom)+')</div><div class="ep-accordion">'+acc('ep-toggle-icon--comm','in','Invitation Comm &nbsp;<small style="color:var(--gris-4);font-weight:400">≤ 300 car.</small>',msgBlock('Invitation Comm',inv_comm,true))+acc('ep-toggle-icon--comm','+','Message post-acceptation Comm',msgBlock('Post-acceptation Comm',msg_comm,false))+acc('ep-toggle-icon--comm','↩','Relance Comm',msgBlock('Relance Comm',rel_comm,false))+'</div></div>':'')+'<div class="ep-section"><div class="ep-section-title">Réponses rapides</div><div class="ep-accordion">'+acc('ep-toggle-icon--rep','✓','Réponses pré-rédigées',repHTML)+'</div></div><div class="ep-section"><div class="ep-section-title">Justification éditoriale</div><div class="ep-accordion">'+acc('ep-toggle-icon--why','?','Pourquoi cette organisation et cette personne ?',whyHTML)+'</div></div></main>';
}

setTimeout(init,200);
window.epToggle=function(btn){btn.closest('.ep-item').classList.toggle('is-open')};
window.epCopy=function(id,btn){var el=document.getElementById(id);var t=el.querySelector('.ep-msg-text');navigator.clipboard.writeText(t?t.innerText:el.innerText).then(function(){btn.textContent='✓ Copié';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copier';btn.classList.remove('copied')},1800)})};
window.epCopyEl=function(id,btn){navigator.clipboard.writeText(document.getElementById(id).innerText||'').then(function(){btn.textContent='✓';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copier';btn.classList.remove('copied')},1800)})};
})();
</script>
