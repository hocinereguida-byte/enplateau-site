<div id="cookie-overlay" class="cookie-overlay" hidden aria-hidden="true"></div>

<div id="cookie-modal" class="cookie-modal" hidden aria-hidden="true">
  <div class="cookie-modal__inner">

    <div class="cookie-modal__kicker">Préférences de confidentialité</div>

    <h2 class="cookie-modal__title">Ce site utilise des cookies</h2>

    <p class="cookie-modal__text">
      En Plateau utilise des cookies nécessaires et, avec votre accord,
      des cookies de mesure d’audience.
    </p>

    <div id="cookie-customize-panel" hidden>
      <label>
        <input id="cookie-analytics" type="checkbox">
        Activer Google Analytics
      </label>
    </div>

    <div class="cookie-modal__actions">
      <button id="cookie-refuse" type="button">Refuser</button>
      <button id="cookie-customize" type="button">Personnaliser</button>
      <button id="cookie-accept" type="button">Accepter</button>
    </div>

  </div>
</div>
