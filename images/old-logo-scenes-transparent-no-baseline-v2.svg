<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="500"
     viewBox="0 0 1600 500"
     fill="none">

  <style>
    .scenes {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 120px;
      font-weight: 700;
      letter-spacing: 28px;
      fill: #ffffff;
    }

    .arbitrage {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 82px;
      font-weight: 300;
      letter-spacing: 18px;
      fill: #ffffff;
    }

    .bracket {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 170px;
      font-weight: 300;
      fill: #ffffff;
    }
  </style>

  <rect width="100%" height="100%" fill="transparent"/>

  <text x="170" y="225" class="bracket">[</text>
  <text x="1030" y="225" class="bracket">]</text>

  <text x="320" y="220" class="scenes">SCÈNES</text>
  <text x="430" y="365" class="arbitrage">D’ARBITRAGE</text>
</svg>
