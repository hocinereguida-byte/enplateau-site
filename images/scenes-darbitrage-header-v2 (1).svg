<svg xmlns="http://www.w3.org/2000/svg"
     width="1800"
     height="560"
     viewBox="0 0 1800 560"
     fill="none">

  <style>
    .scenes {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 138px;
      font-weight: 700;
      letter-spacing: 18px;
      fill: #ffffff;
    }

    .arbitrage {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 94px;
      font-weight: 420;
      letter-spacing: 6px;
      fill: #ffffff;
    }

    .bracket {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 176px;
      font-weight: 260;
      fill: #ffffff;
    }
  </style>

  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Crochets légèrement allégés -->
  <text x="150" y="248" class="bracket">[</text>
  <text x="1125" y="248" class="bracket">]</text>

  <!-- Marque -->
  <text x="325" y="230" class="scenes">SCÈNES</text>

  <!-- Sous-titre rapproché et densifié -->
  <text x="470" y="350" class="arbitrage">D’ARBITRAGE</text>

</svg>
