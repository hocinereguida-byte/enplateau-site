<svg xmlns="http://www.w3.org/2000/svg"
     width="1800"
     height="560"
     viewBox="0 0 1800 560"
     fill="none">

  <style>
    .scenes {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 132px;
      font-weight: 600;
      letter-spacing: 20px;
      fill: #ffffff;
    }

    .arbitrage {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 88px;
      font-weight: 380;
      letter-spacing: 8px;
      fill: #ffffff;
    }

    .bracket {
      font-family: "IBM Plex Sans", Arial, sans-serif;
      font-size: 168px;
      font-weight: 260;
      fill: #ffffff;
    }
  </style>

  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Crochets plus fins et espacés pour laisser respirer SCÈNES -->
  <text x="150" y="245" class="bracket">[</text>
  <text x="1075" y="245" class="bracket">]</text>

  <!-- SCÈNES : moins gras que la V2 pour retrouver le raffinement initial -->
  <text x="325" y="228" class="scenes">SCÈNES</text>

  <!-- D’ARBITRAGE : démarrage décalé sous la zone du C/È, plus proche du logo initial -->
  <text x="470" y="342" class="arbitrage">D’ARBITRAGE</text>

</svg>
