<div class="tally-embed-wrap">
  <iframe
    data-tally-src="https://tally.so/embed/J9LJoY?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
    loading="lazy"
    width="100%"
    height="820"
    frameborder="0"
    marginheight="0"
    marginwidth="0"
    title="Signaler une contribution utile">
  </iframe>
</div>

<script>
  var d = document;
  var w = "https://tally.so/widgets/embed.js";
  var v = function () {
    if (typeof Tally !== "undefined") {
      Tally.loadEmbeds();
    } else {
      d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
        e.src = e.dataset.tallySrc;
      });
    }
  };

  if (typeof Tally !== "undefined") {
    v();
  } else if (d.querySelector('script[src="' + w + '"]') == null) {
    var s = d.createElement("script");
    s.src = w;
    s.onload = v;
    s.onerror = v;
    d.body.appendChild(s);
  }
</script>
